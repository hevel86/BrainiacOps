---

name: Kubeconform

on:
  pull_request:
    paths:
      - 'kubernetes/**/*.yaml'
      - '.github/workflows/kubeconform.yml'
  push:
    branches: [main, master]
    paths:
      - 'kubernetes/**/*.yaml'
      - '.github/workflows/kubeconform.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Fetch all history for all branches and tags for the tj-actions/changed-files action
          fetch-depth: 0
      - name: Get changed Kubernetes YAML files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: |
            kubernetes/**/*.yaml
      - name: Validate changed manifests with kubeconform
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: docker://ghcr.io/yannh/kubeconform:v0.8.0@sha256:5103f6f5e89061728aad4ad5a250627dd0fc9b2a92eb876f3762677a4222f9e0
        with:
          args: -strict -ignore-missing-schemas -summary ${{ steps.changed-files.outputs.all_changed_files }}
      - name: No Kubernetes YAML changes
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No kubernetes YAML changes detected. Skipping kubeconform."
