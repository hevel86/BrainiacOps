# kubernetes/storage/fast/pv-obsidian.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: obsidian-vault-nfs-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  nfs:
    path: /mnt/fast/nas/obsidian
    server: truenas1-nfs.torquasmvo.internal
  storageClassName: ""
