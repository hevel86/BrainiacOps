apiVersion: apps/v1
kind: Deployment
metadata:
  name: azahar
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: azahar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: azahar
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: azahar
          image: lscr.io/linuxserver/azahar:12125.1.1
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: https
              containerPort: 3001
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
            - name: PIXELFLUX_WAYLAND
              value: "true"
            - name: AUTO_GPU
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: games
              mountPath: /games
              subPath: 3ds
              readOnly: true
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              gpu.intel.com/i915: "1"
              cpu: 500m
              memory: 2Gi
            limits:
              gpu.intel.com/i915: "1"
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: azahar-config
        - name: games
          persistentVolumeClaim:
            claimName: media-roms-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
