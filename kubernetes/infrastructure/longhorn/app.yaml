# kubernetes/infrastructure/longhorn/app.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.11.1
    helm:
      values: |
        preUpgradeChecker:
          jobEnabled: false
          upgradeVersionCheck: false
        persistence:
          reclaimPolicy: Retain
          defaultClass: true
          defaultClassReplicaCount: 3
        image:
          longhorn:
            manager:
              # renovate: datasource=docker depName=longhornio/longhorn-manager versioning=docker
              tag: v1.11.1
            instanceManager:
              # renovate: datasource=docker depName=longhornio/longhorn-instance-manager versioning=docker
              tag: v1.11.1
        defaultSettings:
          defaultReplicaCount: '3'
          defaultDataPath: /var/mnt/longhorn
          defaultDataLocality: best-effort
          createDefaultDiskLabeledNodes: true
          # Throttle recovery storms after multi-node maintenance; 1 is slow but reduces rebuild churn.
          concurrentReplicaRebuildPerNodeLimit: '5'
          # 1800s (30m): prevents unnecessary replica rebuilds during node reboots/upgrades
          # Lowering this causes Longhorn to aggressively rebuild replicas mid-reboot, hammering I/O
          replicaReplenishmentWaitInterval: '0'
        longhornUI:
          replicas: 3
        metrics:
          serviceMonitor:
            enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
