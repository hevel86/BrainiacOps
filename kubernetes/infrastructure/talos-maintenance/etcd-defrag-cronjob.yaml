apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-defrag
  namespace: system-upgrade
spec:
  schedule: "0 0 * * 0" # Every Sunday at midnight
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: etcd-defrag
              # renovate: datasource=docker depName=alpine
              image: alpine:3.23.4
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq
                  
                  export TALOS_VERSION="v1.12.5"
                  echo "Downloading talosctl $TALOS_VERSION..."
                  curl -sL -o /usr/local/bin/talosctl https://github.com/siderolabs/talos/releases/download/$TALOS_VERSION/talosctl-linux-amd64
                  chmod +x /usr/local/bin/talosctl
                  
                  # Point to the secret-mounted config
                  export TALOSCONFIG=/var/run/secrets/talos.dev/config
                  
                  # Configuration
                  NODES="10.0.0.34 10.0.0.35 10.0.0.36"
                  THRESHOLD=50.0
                  
                  # 1. Identify the leader robustly
                  echo "Identifying current etcd leader..."
                  LEADER_ID=""
                  for NODE in $NODES; do
                    # Try to get status from each node until one responds
                    RAW_STATUS=$(talosctl -n $NODE etcd status 2>/dev/null | grep "$NODE" || true)
                    if [ -n "$RAW_STATUS" ]; then
                      # Column 8 is the leader ID in the space-separated output
                      LEADER_ID=$(echo "$RAW_STATUS" | awk '{print $8}' | tr -d '\r')
                      if [ -n "$LEADER_ID" ]; then
                        echo "Found leader member ID: $LEADER_ID (via $NODE)"
                        break
                      fi
                    fi
                  done
                  
                  if [ -z "$LEADER_ID" ]; then
                    echo "Error: Could not determine etcd leader. Aborting to prevent unsafe execution."
                    exit 1
                  fi
                  
                  # 2. Analyze fragmentation across all nodes
                  echo ""
                  echo "Analyzing fragmentation (Threshold: $THRESHOLD% usage)..."
                  NON_LEADERS_PLAN=""
                  LEADER_PLAN=""
                  
                  for NODE in $NODES; do
                    NODE_STATUS=$(talosctl -n $NODE etcd status 2>/dev/null | grep "$NODE" || true)
                    
                    if [ -z "$NODE_STATUS" ]; then
                      echo "Warning: Could not get status for $NODE. Skipping."
                      continue
                    fi
                    
                    # Extract usage % and member ID
                    PCT_STR=$(echo "$NODE_STATUS" | grep -o -E '\([0-9.]+%\)' | sed -e 's/(//' -e 's/%)//' | tr -d '\r')
                    MEMBER_ID=$(echo "$NODE_STATUS" | awk '{print $2}' | tr -d '\r')
                    
                    if [ -z "$PCT_STR" ]; then
                      echo "Warning: Could not determine usage for $NODE. Skipping."
                      continue
                    fi
                    
                    # Boolean for defrag need
                    NEEDS_DEFRAG=$(awk -v pct="$PCT_STR" -v thr="$THRESHOLD" 'BEGIN { if (pct < thr) print "1"; else print "0" }')
                    
                    # Tag output for clarity
                    NODE_TAG="[FOLLOWER]"
                    [ "$MEMBER_ID" = "$LEADER_ID" ] && NODE_TAG="[LEADER]"
                    
                    echo "Node $NODE (Member $MEMBER_ID) $NODE_TAG usage: $PCT_STR%"
                    
                    if [ "$NEEDS_DEFRAG" -eq "1" ]; then
                      echo "  -> Requires defragmentation."
                      if [ "$MEMBER_ID" = "$LEADER_ID" ]; then
                        LEADER_PLAN="$NODE"
                      else
                        NON_LEADERS_PLAN="$NON_LEADERS_PLAN $NODE"
                      fi
                    else
                      echo "  -> Usage >= $THRESHOLD%. Skipping."
                    fi
                  done
                  
                  # 3. Execution Phase
                  echo ""
                  echo "=== Execution Plan ==="
                  [ -n "$NON_LEADERS_PLAN" ] && echo "Step 1: Defragment followers: $NON_LEADERS_PLAN" || echo "Step 1: No followers require defragmentation."
                  [ -n "$LEADER_PLAN" ] && echo "Step 2: Defragment leader last: $LEADER_PLAN" || echo "Step 2: Leader does not require defragmentation."
                  echo "======================"
                  echo ""
                  
                  for NODE in $NON_LEADERS_PLAN; do
                    echo "Executing: Defragment follower node $NODE..."
                    talosctl -n $NODE etcd defrag
                    echo "Waiting 10s for cluster stability..."
                    sleep 10
                  done
                  
                  if [ -n "$LEADER_PLAN" ]; then
                    echo "Executing: Defragment leader node $LEADER_PLAN..."
                    talosctl -n $LEADER_PLAN etcd defrag
                    echo "Leader defragmentation complete."
                  fi
                  
                  echo "Defragmentation process complete."

              volumeMounts:
                - name: talos-secrets
                  mountPath: /var/run/secrets/talos.dev
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                runAsNonRoot: false
                runAsUser: 0
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: talos-secrets
              secret:
                secretName: tuppr-talosconfig
