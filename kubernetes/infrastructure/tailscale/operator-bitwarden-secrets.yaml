# Replace the placeholder bwSecretId values with the raw Tailscale OAuth client ID
# and client secret before installing the Kubernetes operator.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: tailscale-operator-oauth
  namespace: tailscale
spec:
  secretName: operator-oauth
  organizationId: "9f7b77c1-18f7-4dc8-b252-b274015d6c40"
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "84b357e8-013f-4af3-8436-b435015a7a3f"
      secretKeyName: client_id
    - bwSecretId: "91eced08-a803-44ba-8944-b435015a98fc"
      secretKeyName: client_secret
