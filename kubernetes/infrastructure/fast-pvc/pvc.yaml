# kubernetes/infrastructure/fast-pvc/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obsidian-vault-nfs-pvc
  namespace: default
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 10Gi
  volumeName: obsidian-vault-nfs-pv
  storageClassName: ""
  volumeMode: Filesystem
