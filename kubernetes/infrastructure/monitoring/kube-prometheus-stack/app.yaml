# kubernetes/apps/monitoring/kube-prometheus-stack/app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "82.13.5"
    helm:
      values: |
        prometheusOperator:
          replicas: 1
        kubeProxy:
          enabled: true
          service:
            enabled: true
            selector:
              k8s-app: kube-proxy
        kubeControllerManager:
          enabled: true
          service:
            enabled: true
            port: 10257
            targetPort: 10257
            selector:
              k8s-app: kube-controller-manager
          serviceMonitor:
            enabled: true
            https: true
            insecureSkipVerify: true
        kubeScheduler:
          enabled: true
          service:
            enabled: true
            port: 10259
            targetPort: 10259
            selector:
              k8s-app: kube-scheduler
          serviceMonitor:
            enabled: true
            https: true
            insecureSkipVerify: true
        prometheus:
          prometheusSpec:
            replicas: 1
            serviceMonitorNamespaceSelector: {}
            serviceMonitorSelector: {}
            serviceMonitorSelectorNilUsesHelmValues: false
          service:
            type: LoadBalancer
            loadBalancerIP: 10.0.0.230
            annotations:
              external-dns.alpha.kubernetes.io/hostname: prometheus.torquasmvo.internal
        alertmanager:
          templateFiles:
            ntfy.tmpl: |
              {{ define "ntfy.text" -}}
              {{ if eq .Status "firing" }}🔥 Firing{{ else }}✅ Resolved{{ end }} ({{ .Alerts | len }})
              {{ range .Alerts }}
              ---
              Summary: {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Severity: {{ .Labels.severity }}
              {{ end }}
              {{- end }}
          alertmanagerSpec:
            replicas: 1
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ["alertname", "job"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: "null"
              routes:
                - receiver: "null"
                  matchers:
                    - alertname =~ "Watchdog|InfoInhibitor"
                - receiver: "ntfy"
                  matchers:
                    - severity =~ "critical|warning"
            inhibit_rules:
              - source_matchers:
                  - severity = "critical"
                target_matchers:
                  - severity =~ "warning|info"
                equal: ["namespace", "alertname"]
              - source_matchers:
                  - severity = "warning"
                target_matchers:
                  - severity = "info"
                equal: ["namespace", "alertname"]
            receivers:
              - name: "null"
              - name: "ntfy"
                webhook_configs:
                  - url: http://alertmanager-ntfy.monitoring.svc.cluster.local:8080/hook
                    send_resolved: true
          service:
            type: LoadBalancer
            loadBalancerIP: 10.0.0.231
            annotations:
              external-dns.alpha.kubernetes.io/hostname: alertmanager.torquasmvo.internal
        grafana:
          replicas: 1
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
          service:
            type: LoadBalancer
            loadBalancerIP: 10.0.0.232
            annotations:
              external-dns.alpha.kubernetes.io/hostname: grafana.torquasmvo.internal
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
