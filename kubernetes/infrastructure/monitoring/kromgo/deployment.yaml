apiVersion: apps/v1
kind: Deployment
metadata:
  name: kromgo
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kromgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kromgo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kromgo
    spec:
      containers:
      - name: kromgo
        image: ghcr.io/kashalls/kromgo:v0.7.5
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: PROMETHEUS_URL
          value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
        - name: SERVER_PORT
          value: "8080"
        resources:
          requests:
            cpu: 15m
            memory: 64Mi
          limits:
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /kromgo
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: kromgo
---
apiVersion: v1
kind: Service
metadata:
  name: kromgo
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kromgo
spec:
  selector:
    app.kubernetes.io/name: kromgo
  ports:
  - name: http
    port: 80
    targetPort: http
