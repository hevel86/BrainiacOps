apiVersion: v1
kind: ConfigMap
metadata:
  name: kromgo
  namespace: monitoring
data:
  config.yaml: |
    # yaml-language-server: $schema=https://raw.githubusercontent.com/kashalls/kromgo/main/config.schema.json
    badge:
      font: Verdana.ttf
      size: 12

    metrics:
      - name: talos_version
        query: 'max(node_os_info{name="Talos"}) by (version_id)'
        label: "version_id"
        title: Talos
        colors:
          - { color: "blue", min: 0, max: 0 }

      - name: kubernetes_version
        query: 'max(kubernetes_build_info{service="kubernetes"}) by (git_version)'
        label: "git_version"
        title: Kubernetes
        colors:
          - { color: "blue", min: 0, max: 0 }

      - name: cluster_node_count
        query: 'count(count by (node) (kube_node_status_condition{condition="Ready"}))'
        title: Nodes
        colors:
          - { color: "red", min: 0, max: 2 }
          - { color: "brightgreen", min: 3, max: 100 }

      - name: cluster_pod_count
        query: 'sum(kube_pod_status_phase{phase="Running"})'
        title: Pods
        colors:
          - { color: "brightgreen", min: 0, max: 999 }

      - name: cluster_cpu_usage
        query: 'round(avg(instance:node_cpu_utilisation:rate5m{kubernetes_node!=""}) * 100, 0.1)'
        suffix: "%"
        title: CPU
        colors:
          - { color: "brightgreen", min: 0, max: 50 }
          - { color: "orange", min: 50, max: 75 }
          - { color: "red", min: 75, max: 100 }

      - name: cluster_memory_usage
        query: 'round(sum(node_memory_MemTotal_bytes{kubernetes_node!=""} - node_memory_MemAvailable_bytes{kubernetes_node!=""}) / sum(node_memory_MemTotal_bytes{kubernetes_node!=""}) * 100, 0.1)'
        suffix: "%"
        title: Memory
        colors:
          - { color: "brightgreen", min: 0, max: 50 }
          - { color: "orange", min: 50, max: 75 }
          - { color: "red", min: 75, max: 100 }

      - name: cluster_age_days
        query: 'round((time() - min(kube_node_created) ) / 86400)'
        suffix: "d"
        title: Age
        colors:
          - { color: "brightgreen", min: 0, max: 36500 }

      - name: cluster_uptime_days
        query: 'round(avg(node_time_seconds{kubernetes_node!=""} - node_boot_time_seconds{kubernetes_node!=""}) / 86400)'
        suffix: "d"
        title: Uptime
        colors:
          - { color: "brightgreen", min: 0, max: 36500 }

      - name: cluster_alert_count
        query: 'alertmanager_alerts{state="active"} - 1' # Ignore Watchdog
        title: Alerts
        colors:
          - { color: "brightgreen", min: 0, max: 0 }
          - { color: "orange", min: 1, max: 5 }
          - { color: "red", min: 5, max: 100 }
