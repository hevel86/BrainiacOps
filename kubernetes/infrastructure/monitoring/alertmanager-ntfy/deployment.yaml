# kubernetes/infrastructure/monitoring/alertmanager-ntfy/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-ntfy
  namespace: monitoring
  labels:
    app: alertmanager-ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-ntfy
  template:
    metadata:
      labels:
        app: alertmanager-ntfy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: render-auth-config
        image: registry.k8s.io/busybox:1.36.1
        command:
        - /bin/sh
        - -ec
        - |
          token="$(cat /secrets/token)"
          printf 'ntfy:\n  auth:\n    token: "%s"\n' "$token" > /generated/auth.yml
        volumeMounts:
        - name: ntfy-token
          mountPath: /secrets
          readOnly: true
        - name: generated-config
          mountPath: /generated
      containers:
      - name: alertmanager-ntfy
        image: ghcr.io/alexbakker/alertmanager-ntfy:1.1.0
        args:
        - --configs
        - /etc/alertmanager-ntfy/config.yml,/etc/alertmanager-ntfy-generated/auth.yml
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: alertmanager-ntfy-config
          mountPath: /etc/alertmanager-ntfy
          readOnly: true
        - name: generated-config
          mountPath: /etc/alertmanager-ntfy-generated
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          limits:
            memory: 64Mi
            cpu: 100m
          requests:
            memory: 32Mi
            cpu: 10m
      volumes:
      - name: alertmanager-ntfy-config
        configMap:
          name: alertmanager-ntfy-config
      - name: ntfy-token
        secret:
          secretName: ntfy-token
          items:
          - key: token
            path: token
      - name: generated-config
        emptyDir: {}
