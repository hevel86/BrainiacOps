apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-tailscale
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-tailscale-role
  namespace: default
rules:
  # Allow creating secrets (cannot be restricted by name in RBAC)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  # Let tailscaled store/read its state in Secret "n8n-tailscale-state"
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["n8n-tailscale-state"]
    verbs: ["get", "update", "patch"]
  # Let it write Pod Events for easier debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-tailscale-rb
  namespace: default
subjects:
  - kind: ServiceAccount
    name: n8n-tailscale
    namespace: default
roleRef:
  kind: Role
  name: n8n-tailscale-role
  apiGroup: rbac.authorization.k8s.io
