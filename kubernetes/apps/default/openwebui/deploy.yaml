apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: default
  labels:
    app: openwebui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: "America/New_York"
            - name: WEBUI_NAME
              value: "Brainiac AI"
            # OLLAMA_BASE_URL: Leave as default (localhost:11434) or set if you have external Ollama
            # - name: OLLAMA_BASE_URL
            #   value: "http://ollama-service.namespace.svc.cluster.local:11434"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-pvc
