apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: paperless-secrets
  namespace: default
  labels:
    app: paperless-ngx
spec:
  secretName: paperless-secrets
  organizationId: "9f7b77c1-18f7-4dc8-b252-b274015d6c40"
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "00000000-0000-0000-0000-000000000000"
      secretKeyName: PAPERLESS_SECRET_KEY
    - bwSecretId: "00000000-0000-0000-0000-000000000001"
      secretKeyName: PAPERLESS_DBPASS
    - bwSecretId: "00000000-0000-0000-0000-000000000002"
      secretKeyName: PAPERLESS_ADMIN_USER
    - bwSecretId: "00000000-0000-0000-0000-000000000003"
      secretKeyName: PAPERLESS_ADMIN_PASSWORD
