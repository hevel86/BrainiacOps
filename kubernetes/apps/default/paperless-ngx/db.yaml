apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-db
  labels:
    app: paperless-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless-db
  template:
    metadata:
      labels:
        app: paperless-db
    spec:
      containers:
        - name: postgres
          image: public.ecr.aws/docker/library/postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: paperless
            - name: POSTGRES_USER
              value: paperless
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-secrets
                  key: PAPERLESS_DBPASS
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: paperless-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-db
spec:
  type: ClusterIP
  selector:
    app: paperless-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-prod
  resources:
    requests:
      storage: 5Gi
