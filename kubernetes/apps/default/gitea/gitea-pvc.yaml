apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data-pvc-lh
  namespace: default
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn-prod
  volumeMode: Filesystem
